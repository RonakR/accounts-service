name: Error - Missing Required Fields
status: 400
headers:
  - key: Content-Type
    value: application/json
body:
  mode: raw
  options:
    raw:
      language: json
  raw: |
    {
      "error": "Bad Request",
      "message": "Missing required fields: name, email are required",
      "statusCode": 400
    }
