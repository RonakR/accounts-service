name: Success - Account Credited
status: 200
headers:
  - key: Content-Type
    value: application/json
body:
  mode: raw
  options:
    raw:
      language: json
  raw: |
    {
      "accountId": "a1",
      "balance": 350.50
    }
request:
  method: POST
  url:
    raw: "{{baseUrl}}/accounts/:id/credit"
  pathVariables:
    - key: id
      value: a1
  headers:
    - key: Content-Type
      value: application/json
  body:
    mode: raw
    options:
      raw:
        language: json
    raw: |
      {
        "amount": 100
      }
