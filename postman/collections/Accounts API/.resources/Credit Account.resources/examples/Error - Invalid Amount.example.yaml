name: Error - Invalid Amount
status: 400
headers:
  - key: Content-Type
    value: application/json
body:
  mode: raw
  options:
    raw:
      language: json
  raw: |
    {
      "error": "Bad Request",
      "message": "Invalid amount: amount must be a positive number",
      "statusCode": 400
    }
request:
  method: POST
  url:
    raw: "{{baseUrl}}/accounts/:id/credit"
  pathVariables:
    - key: id
      value: a1
  headers:
    - key: Content-Type
      value: application/json
  body:
    mode: raw
    options:
      raw:
        language: json
    raw: |
      {
        "amount": -50
      }
